name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: forge/package-lock.json
      - name: Install
        working-directory: forge
        run: npm install
      - name: Lint
        working-directory: forge
        run: npm run lint
      - name: Typecheck
        working-directory: forge
        run: npm run typecheck
      - name: Build
        working-directory: forge
        run: npm run build
